name: CI
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_pass
          POSTGRES_DB: realestate_crm
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd server && npm install
      - run: cd server && npx jest --no-coverage
        env:
          DATABASE_URL: postgres://crm:crm_pass@localhost:5432/realestate_crm
          JWT_SECRET: test_secret_key_for_ci_pipeline_automation
          JWT_EXPIRES_IN: 1d

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd client && npm install --legacy-peer-deps
      - run: cd client && npx vitest run
